<div class="cr-modal-backdrop hidden"
     id="{{ modal_id }}"
     role="dialog"
     aria-modal="true"
     aria-labelledby="{{ modal_id }}-title">
  <div class="cr-modal">
    <button class="cr-modal__close"
            data-cr-modal-close="{{ modal_id }}"
            aria-label="Close"
            type="button">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
           aria-hidden="true">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6"  y1="6" x2="18" y2="18"/>
      </svg>
    </button>
    <h2 class="cr-modal__title" id="{{ modal_id }}-title"></h2>
    <p class="cr-modal__sub"   id="{{ modal_id }}-sub"></p>
    <div id="{{ modal_id }}-body"></div>
  </div>
</div>
