{% load static %}
<!DOCTYPE html>
<html lang="en" class="theme-dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — EdPal</title>

  <link rel="icon" href="{% static 'core/img/edpal-logo.jpg' %}" type="image/jpeg" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Tailwind CDN (layout utilities only) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Shared design tokens, buttons, inputs -->
  <link rel="stylesheet" href="{% static 'accounts/css/registration.css' %}" />
  <!-- Page-specific styles -->
  <link rel="stylesheet" href="{% static 'accounts/css/reset_password.css' %}" />

  <!-- Prevent theme flash -->
  <script>
    (function(){
      if (localStorage.getItem('reg_theme') !== 'light')
        document.documentElement.classList.add('theme-dark');
      else
        document.documentElement.classList.remove('theme-dark');
    })();
  </script>
</head>

<body class="rp-body">

  <!-- ══ PAGE HEADER ══ -->
  <header class="rp-header">
    <div class="rp-logo">
      <img
        src="{% static 'core/img/edpal-logo.jpg' %}"
        alt="EdPal logo"
        class="sn-brand__logo"
      />
      <span class="rp-logo__text">EdPal</span>
    </div>
    <button
      id="themeToggle"
      class="theme-toggle"
      aria-label="Toggle light / dark theme"
      title="Toggle theme"
    >
      <span class="theme-toggle__icon theme-toggle__icon--sun" aria-hidden="true">☀</span>
      <span class="theme-toggle__icon theme-toggle__icon--moon" aria-hidden="true">☽</span>
    </button>
  </header>

  <!-- ══ CENTERED CARD ══ -->
  <main class="rp-main" id="rpMain">
    <div class="rp-card" role="main">

      <!-- Card icon -->
      <div class="rp-card__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="36" height="36">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"/>
        </svg>
      </div>

      <h1 class="rp-heading">Reset your password</h1>
      <p class="rp-subheading">Choose a strong new password for your account.</p>

      <!-- ── Status / error banner (populated by JS) ── -->
      <div
        id="rp-status"
        class="rp-status hidden"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
      ></div>

      <!-- ══ FORM ══
           No action attribute — JS posts to window.location.href.
           The hidden submit is the no-JS fallback (posts to same URL natively).
      ══ -->
      <form
        id="resetForm"
        method="POST"
        novalidate
        autocomplete="off"
        aria-label="Reset password form"
      >
        {% csrf_token %}

        <!-- New password -->
        <div class="form-group mb-5">
          <label class="form-label" for="id_new_password">
            New password <span class="required-star" aria-hidden="true">*</span>
          </label>
          <div class="input-wrapper">
            <input
              class="form-input"
              type="password"
              id="id_new_password"
              name="new_password"
              required
              minlength="8"
              autocomplete="new-password"
              aria-describedby="rp-pw-strength-text rp-err-new-password"
              placeholder="Min. 8 characters"
            />
            <button
              type="button"
              class="input-toggle-pw"
              data-target="id_new_password"
              aria-label="Show password"
            >
              <!-- Eye icon -->
              <svg id="rp-eye-1" viewBox="0 0 20 20" fill="currentColor" width="16" height="16" aria-hidden="true">
                <path d="M10 12.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z"/>
                <path fill-rule="evenodd" d="M.664 10.59a1.651 1.651 0 0 1 0-1.186A10.004 10.004 0 0 1 10 3c4.257 0 7.893 2.66 9.336 6.41.147.381.146.804 0 1.186A10.004 10.004 0 0 1 10 17c-4.257 0-7.893-2.66-9.336-6.41ZM14 10a4 4 0 1 1-8 0 4 4 0 0 1 8 0Z" clip-rule="evenodd"/>
              </svg>
            </button>
          </div>

          <!-- Strength meter -->
          <div class="rp-meter" aria-label="Password strength" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="4">
            <div class="rp-meter__bar">
              <div class="rp-meter__fill" id="rp-meter-fill"></div>
            </div>
            <span class="rp-meter__text" id="rp-pw-strength-text" aria-live="polite"></span>
          </div>
          <span id="rp-err-new-password" class="form-error" role="alert" aria-live="polite"></span>
        </div>

        <!-- Confirm password -->
        <div class="form-group mb-6">
          <label class="form-label" for="id_new_password_confirm">
            Confirm new password <span class="required-star" aria-hidden="true">*</span>
          </label>
          <div class="input-wrapper">
            <input
              class="form-input"
              type="password"
              id="id_new_password_confirm"
              name="new_password_confirm"
              required
              minlength="8"
              autocomplete="new-password"
              aria-describedby="rp-err-new-password-confirm"
              placeholder="Repeat your password"
            />
            <button
              type="button"
              class="input-toggle-pw"
              data-target="id_new_password_confirm"
              aria-label="Show confirm password"
            >
              <svg id="rp-eye-2" viewBox="0 0 20 20" fill="currentColor" width="16" height="16" aria-hidden="true">
                <path d="M10 12.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z"/>
                <path fill-rule="evenodd" d="M.664 10.59a1.651 1.651 0 0 1 0-1.186A10.004 10.004 0 0 1 10 3c4.257 0 7.893 2.66 9.336 6.41.147.381.146.804 0 1.186A10.004 10.004 0 0 1 10 17c-4.257 0-7.893-2.66-9.336-6.41ZM14 10a4 4 0 1 1-8 0 4 4 0 0 1 8 0Z" clip-rule="evenodd"/>
              </svg>
            </button>
          </div>
          <span id="rp-err-new-password-confirm" class="form-error" role="alert" aria-live="polite"></span>
        </div>

        <!-- Submit button -->
        <button
          type="submit"
          id="rp-submit"
          class="btn-primary btn-submit rp-submit-btn"
          aria-label="Set new password"
        >
          <span class="btn-submit__text">Set new password</span>
          <!-- Spinner: shown via JS .loading class -->
          <span class="btn-submit__spinner rp-submit-spinner" aria-hidden="true"></span>
        </button>

      </form><!-- /#resetForm -->

      <!-- Back to login -->
      <p class="rp-footer-link">
        Remember your password?
        <a href="{% url 'user_login' %}" class="reg-link">Sign in</a>
      </p>

    </div><!-- /.rp-card -->
  </main>

  <!-- ══ SUCCESS TOAST (hidden; JS shows it) ══ -->
  <div
    id="rp-toast"
    class="rp-toast hidden"
    role="status"
    aria-live="polite"
    aria-atomic="true"
  >
    <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18" class="rp-toast__icon" aria-hidden="true">
      <path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm3.857-9.809a.75.75 0 0 0-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 1 0-1.06 1.061l2.5 2.5a.75.75 0 0 0 1.137-.089l4-5.5Z" clip-rule="evenodd"/>
    </svg>
    <span class="rp-toast__text">Password updated! Redirecting…</span>
  </div>

  <script>
    window.REDIRECT_URL = "{% url 'user_dashboard' %}"
  </script>
  <script src="{% static 'accounts/js/reset_password.js' %}"></script>

</body>
</html>
